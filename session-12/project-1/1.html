<!DOCTYPE html>

    <!-- link to bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- link to custom css file -->

<body>
    <div class="container">
        <form class="w-50 mx-auto mt-5 bg-light p-s">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-control" name="username" id="username">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control">
            </div>
             <!-- skills -->
             <label>Select your skills</label>
              <div class="mb-3 form-check form-switch">
                
                 <input type="checkbox" name="css" id="css" class="form-check-input">
                 <label for="css" class="form-check-label">CSS</label>
              </div>

              <!-- select -->
               <div class="mb-3">
                <label for="state">Select state</label>
                <select name="state" id="state" class="form-select">
                    <option value="ap">Andhra pradesh</option>
                    <option value="tg">Telangana</option>
                </select>
               </div>

            <div class="mb-3">
                <label for="fb" class="form-label">Feedback</label>
                <textarea name="fb" id="fb" rows="5" class="form-control"></textarea>
            </div>
            <!-- submit -->
             <button class="btn btn-outline-success">Submit</button>
        </form>
