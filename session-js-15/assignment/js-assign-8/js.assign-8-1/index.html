<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Document</title>
</head>
<body>
    <!-- two cards in 1 row -->
     <!-- row -->
      <section>
        <main>
            <!-- item-1 -->
             <div class="item1 item">
                 <h1>Login</h1>
                 <img class="i" src="https://w7.pngwing.com/pngs/886/231/png-transparent-facebook-media-online-social-black-white-social-media-icons-icon-thumbnail.png" width="50px" alt="">
                 <img src="https://e7.pngegg.com/pngimages/130/279/png-clipart-twitter-icon-computer-icons-logo-twitter-miscellaneous-leaf-thumbnail.png" width="50px" alt="">
                 <p>
                or use your account
                 </p>
                 <form>
                    <input type="email" name="Email" placeholder="Email" id="email">
                    <br>
                    <input type="password" name="Password" placeholder="Password" id="password">
                 </form>
                 <p class="ff">Forget your password?<p>
                 <button>LOG IN</button>
            </div>
             <!-- item-2 -->
              <div class="item2 item">
                 <h1 class="foem">
                    HTML CSS Login Form
                 </h1>
                 <p class="p">
                    This login form is created using pure <br> HTML and CSS for social icons. <br>FontAwesome is used
                 </p>
            </div>
        </main>
      </section>
    <script src="./script.js"></script>
</body>
</html>
